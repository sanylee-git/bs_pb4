<head>

  <meta charset="UTF-8" />

  <meta name="description"  content="">
  <meta name="keywords"     content="">

  <meta name="apple-mobile-web-app-title"            content="">

  <!-- OG / Twitter -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="">
  <meta property="og:site_name"   content="">
  <meta property="og:title"       content="">
  <meta property="og:description" content="">
  <meta property="og:image"       content="">

  <!-- Google AdSense (새 프로젝트 시 ID 교체) -->
  <meta name="google-adsense-account" content="ca-pub-9688338422874533">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9688338422874533" crossorigin="anonymous"></script>

  <!-- Favicons & PWA -->
  <link rel="icon"         href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <link rel="manifest"     href="/manifest.json">

  <!-- Google Fonts (필요 시 폰트 교체) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- 스타일 -->
  <link rel="stylesheet" href="/style.css">

  <meta name="google-site-verification" content="VnZrSxtYeUu7GslVviJ9DO6FlpzVA6Z-QyfG0uV0rk8" />
</head>
<body>

  <!-- 배경 파티클 캔버스 -->
  <canvas id="bg-canvas"></canvas>

  <!-- ============================================================
       네비게이션
       ============================================================ -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-logo" id="nav-logo" href="/">···</a>
      <div class="nav-links">
        <a href="/"            class="active">홈</a>
        <a href="/about.html"  >소개</a>
        <a href="/contact.html">문의</a>
        <a href="/privacy.html">개인정보</a>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">KO</button>
        <span   class="lang-sep">|</span>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <button class="nav-hamburger" aria-label="메뉴 열기" onclick="toggleNav()">☰</button>
    </div>
    <div class="nav-mobile" id="nav-mobile">
      <a href="/"            class="active">홈</a>
      <a href="/about.html"  >소개</a>
      <a href="/contact.html">문의</a>
      <a href="/privacy.html">개인정보</a>
      <div class="lang-toggle lang-toggle-mobile">
        <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">KO</button>
        <span   class="lang-sep">|</span>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>

  <!-- ============================================================
       메인 래퍼
       ============================================================ -->
  <div class="wrapper">

    <!-- 헤더 — main.js 가 site.config.js 로부터 자동 렌더링 -->
    <header class="site-header" id="site-header"></header>

    <div class="divider"></div>

    <!-- ── AI 분석 카드 (기능 고정, 내용은 config 기반) ── -->
    <div class="main-card">

      <!-- 로딩 오버레이 -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">모델 불러오는 중...</div>
      </div>

      <!-- 탭 -->
      <div class="mode-tabs">
        <button class="tab-btn active" id="tab-cam"    onclick="switchTab('cam')">📷 카메라</button>
        <button class="tab-btn"        id="tab-upload" onclick="switchTab('upload')">🖼️ 이미지 업로드</button>
      </div>

      <!-- 스캔 프레임 (카메라 탭) -->
      <div class="scan-frame" id="scan-frame">
        <div class="scan-inner">
          <div class="ring"></div>
          <div class="ring ring-2"></div>
          <div class="scan-line"></div>
          <div id="webcam-container">
            <div class="cam-placeholder" id="cam-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span id="cam-placeholder-text">카메라를 시작하세요</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 업로드 영역 (업로드 탭) -->
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p id="upload-hint"><strong>클릭</strong>하거나 이미지를 드래그 &amp; 드롭</p>
        <p id="upload-types" style="margin-top:5px;font-size:11px;">JPG · PNG · WEBP 지원</p>
        <input type="file" id="file-input" accept="image/*" onchange="onFileSelect(event)">
        <img id="preview-img" style="display:none;margin-top:14px;border-radius:12px;max-height:200px;object-fit:cover;width:100%;">
      </div>

      <!-- 버튼 -->
      <div class="btn-group">
        <button class="btn-main btn-scan" id="start-btn" onclick="handleStart()" disabled>⚡ 분석 시작</button>
        <button class="btn-main btn-reset" title="초기화" onclick="resetAll()">↺</button>
      </div>

      <p id="status-msg">모델을 준비 중입니다...</p>
    </div>
    <!-- /.main-card -->

    <!-- ── 결과 섹션 (구조 고정) ── -->
    <div id="result-section">

      <!-- 최고 매치 카드 -->
      <div class="result-hero">
        <div class="demon-eye">
          <svg viewBox="0 0 60 60" fill="none">
            <ellipse cx="30" cy="30" rx="28" ry="16" fill="rgba(var(--crimson-rgb),0.15)" stroke="rgba(var(--crimson-rgb),0.5)" stroke-width="1.5"/>
            <ellipse cx="30" cy="30" rx="12" ry="12" fill="#1a0010" stroke="rgba(var(--crimson-rgb),0.8)" stroke-width="1"/>
            <ellipse cx="30" cy="30" rx="7"  ry="7"  fill="var(--crimson)" opacity="0.9"/>
            <ellipse cx="30" cy="30" rx="3.5" ry="3.5" fill="#0a0005"/>
            <ellipse cx="32" cy="28" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.6)"/>
            <text x="30" y="33" text-anchor="middle" font-size="5" fill="rgba(var(--gold-rgb),0.7)" font-family="serif" id="result-eye-symbol">CSM</text>
          </svg>
        </div>
        <div class="result-label" data-result-label>당신과 닮은 캐릭터</div>
        <div class="result-name"  id="result-name">—</div>
        <div class="result-rank"  id="result-rank"></div>
        <div class="result-desc"  id="result-desc"></div>
        <div class="result-score-big"   id="result-score">0%</div>
        <div class="result-score-label" data-score-label>유사도</div>
      </div>

      <!-- 전체 결과 바 -->
      <div class="all-results">
        <h3 data-all-label>전체 분석 결과</h3>
        <div id="label-container"></div>
      </div>

      <!-- SNS 공유 카드 -->
      <div class="share-result-card">
        <p class="share-result-label">🔥 결과 공유하기</p>
        <div class="share-btns">
          <button class="share-btn s-save"    onclick="downloadResultCard()"   title="결과 이미지 저장">💾 이미지 저장</button>
          <button class="share-btn s-native"  onclick="shareSNS('native')"    title="공유하기" id="share-native-btn">📱 공유하기</button>
          <button class="share-btn s-twitter" onclick="shareSNS('twitter')"   title="X(Twitter)로 공유">𝕏 트위터</button>
          <button class="share-btn s-facebook"onclick="shareSNS('facebook')"  title="Facebook으로 공유">Facebook</button>
          <button class="share-btn s-threads" onclick="shareSNS('threads')"   title="Threads로 공유">⊕ Threads</button>
          <button class="share-btn s-copy"    onclick="shareSNS('copy')"      id="share-copy-btn">🔗 링크 복사</button>
        </div>
        <p class="share-hashtags"></p>
      </div>

    </div>
    <!-- /#result-section -->

    <!-- 복사 토스트 -->
    <div id="copy-toast">✅ 클립보드에 복사됐어요!</div>

    <!-- ── 가이드 섹션 — main.js 가 site.config.js 로부터 자동 렌더링 ── -->
    <section class="guide-section" id="guide-section"></section>

    <!-- ── Disqus 댓글 ── -->
    <div class="disqus-wrap">
      <p class="disqus-title">💬 댓글 · Comments</p>
      <div id="disqus_thread"></div>
      <noscript>댓글을 보려면 JavaScript를 활성화하세요.</noscript>
    </div>

    <!-- ── 푸터 — main.js 가 site.config.js 로부터 자동 렌더링 ── -->
    <footer class="site-footer" id="site-footer"></footer>

  </div>
  <!-- /.wrapper -->

  <!-- ── 플로팅 SNS 공유 버튼 ── -->
  <div class="share-float" id="share-float">
    <div class="sf-items" id="sf-items">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button class="sf-btn sf-twitter"  onclick="shareSNS('twitter')"  title="X(Twitter)">𝕏</button>
        <span class="sf-label">트위터</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button class="sf-btn sf-facebook" onclick="shareSNS('facebook')" title="Facebook">f</button>
        <span class="sf-label">Facebook</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button class="sf-btn sf-threads"  onclick="shareSNS('threads')"  title="Threads">⊕</button>
        <span class="sf-label">Threads</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <button class="sf-btn sf-copy"     onclick="shareSNS('copy')"     title="링크 복사">🔗</button>
        <span class="sf-label">복사</span>
      </div>
    </div>
    <button class="sf-main" id="sf-main-btn" onclick="toggleShareFloat()" aria-label="공유">↗</button>
  </div>

  <!-- ============================================================
       스크립트 로딩 순서 (body 하단 — 렌더 블로킹 제거)
       1. TensorFlow.js + TeachableMachine (AI 추론)
       2. site.config.js  ← 새 프로젝트 시 이 파일만 교체
       3. i18n.js         ← 언어 전환 유틸
       4. main.js         ← 모든 로직 + 렌더링
       ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"                                   crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"         crossorigin="anonymous"></script>
  <script src="/site.config.js"></script>
  <script src="/i18n.js"></script>
  <script src="/main.js"></script>

</body>
</html>
